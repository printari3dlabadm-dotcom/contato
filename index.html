<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printari 3D Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.container{
    width:90%;
    max-width:420px;
    text-align:center;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.perfil img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.3);
    margin-bottom:15px;
}

.perfil h1{
    font-size:22px;
    font-weight:700;
}

.perfil p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:30px;
}

.links a{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-decoration:none;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:16px;
    margin-bottom:15px;
    border-radius:14px;
    color:#fff;
    font-weight:600;
    transition: all 0.3s ease;
    border:1px solid rgba(255,255,255,0.2);
}

.links a:hover{
    background:#ffffff;
    color:#2a5298;
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

footer{
    margin-top:25px;
    font-size:12px;
    opacity:0.7;
}

@media (prefers-color-scheme: light) {
    body{
        background: linear-gradient(135deg, #e3f2fd, #90caf9);
        color:#222;
    }

    .links a{
        background:#fff;
        color:#333;
        border:1px solid #ddd;
    }

    .links a:hover{
        background:#2a5298;
        color:#fff;
    }
}
</style>
</head>

<body>

<div class="container">
    
    <div class="perfil">
        <img src="logo.jpeg" alt="Logo Printari 3D Lab">
        <h1>Printari 3D Lab</h1>
        <p>Impressão 3D • Projetos personalizados</p>
    </div>

    <div class="links">
        <a href="https://www.instagram.com/printari_3dlab?igsh=Y2dsb21hcWF0eDhh&utm_source=qr" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://wa.me/5583996065151" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>

        <a href="https://maps.google.com/?q=Maria+Fernanda+-+R.+Francisco+Beltrão,+90+-+Jardim+Oceania,+João+Pessoa+-+PB,+58037-605" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-map-marker-alt"></i> Localização
        </a>

        <a href="https://shopee.com.br/printari_3dlab?categoryId=100636&entryPoint=ShopByPDP&itemId=58252453924&upstream=search" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-store"></i> Loja na Shopee
        </a>
    </div>

    <footer>
        © 2026 Printari 3D Lab
    </footer>

</div>

</body>
</html>
